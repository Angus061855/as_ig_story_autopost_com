name: Refresh IG Access Token

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1號自動執行
  workflow_dispatch:       # 可手動觸發

jobs:
  refresh-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pynacl

      - name: Refresh IG Access Token
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests
          import os
          import sys
          import base64
          from nacl import encoding, public

          token = os.environ["IG_ACCESS_TOKEN"]
          app_id = os.environ["IG_APP_ID"]
          app_secret = os.environ["IG_APP_SECRET"]
          gh_pat = os.environ["GH_PAT"]
          repo = os.environ["REPO"]

          # 換新 token
          refresh_url = "https://graph.facebook.com/oauth/access_token"
          params = {
              "grant_type": "fb_exchange_token",
              "client_id": app_id,
              "client_secret": app_secret,
              "fb_exchange_token": token
          }
          res = requests.get(refresh_url, params=params)
          data = res.json()
          print(f"換新回應：{data}")

          if "access_token" not in data:
              print(f"換新失敗：{data}")
              sys.exit(1)

          new_token = data["access_token"]
          expires_in = data.get("expires_in", "unknown")
          print(f"換新成功，有效期：{expires_in} 秒")

          # 取得 repo public key
          headers = {
              "Authorization": f"Bearer {gh_pat}",
              "Accept": "application/vnd.github+json"
          }
          key_res = requests.get(
              f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
              headers=headers
          )
          key_data = key_res.json()
          public_key = key_data["key"]
          key_id = key_data["key_id"]

          # 加密新 token
          pk = public.PublicKey(public_key.encode(), encoding.Base64Encoder)
          box = public.SealedBox(pk)
          encrypted = base64.b64encode(box.encrypt(new_token.encode())).decode()

          # 寫入 Secret
          update_res = requests.put(
              f"https://api.github.com/repos/{repo}/actions/secrets/IG_ACCESS_TOKEN",
              headers=headers,
              json={"encrypted_value": encrypted, "key_id": key_id}
          )

          if update_res.status_code in [201, 204]:
              print("GitHub Secret 更新成功！")
          else:
              print(f"GitHub Secret 更新失敗：{update_res.text}")
              sys.exit(1)
          EOF
